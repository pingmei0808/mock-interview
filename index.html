<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面霸 - AI 模拟面试平台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#333}
        .container{max-width:1200px;margin:0 auto;padding:20px}
        header{text-align:center;padding:40px 0;color:#fff}
        .logo{font-size:48px;font-weight:bold;margin-bottom:10px}
        .tagline{font-size:18px;opacity:0.9}
        .main-content{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:30px}
        @media(max-width:900px){.main-content{grid-template-columns:1fr}}
        .panel{background:#fff;border-radius:16px;padding:30px;box-shadow:0 10px 40px rgba(0,0,0,0.1)}
        .panel h2{color:#667eea;margin-bottom:20px;font-size:24px}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;margin-bottom:8px;color:#555;font-weight:500}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px}
        .form-group input:focus,.form-group textarea:focus{outline:none;border-color:#667eea}
        .btn{padding:14px 28px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
        .btn-primary{background:linear-gradient(90deg,#667eea,#764ba2);color:#fff;width:100%}
        .chat-container{display:none;flex-direction:column;height:600px}
        .chat-container.active{display:flex}
        .chat-messages{flex:1;overflow-y:auto;padding:20px;background:#f8f9fa;border-radius:12px;margin-bottom:20px}
        .message{margin-bottom:20px;display:flex;gap:12px}
        .message.interviewer{flex-direction:row}
        .message.candidate{flex-direction:row-reverse}
        .avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
        .avatar.interviewer{background:#667eea}
        .avatar.candidate{background:#764ba2}
        .message-content{max-width:70%;padding:12px 16px;border-radius:12px;line-height:1.6}
        .message.interviewer .message-content{background:#fff;border-bottom-left-radius:4px}
        .message.candidate .message-content{background:#667eea;color:#fff;border-bottom-right-radius:4px}
        .chat-input{display:flex;gap:10px}
        .chat-input textarea{flex:1;padding:12px;border:2px solid #e0e0e0;border-radius:8px;resize:none;min-height:60px;font-family:inherit}
        .chat-input textarea:focus{outline:none;border-color:#667eea}
        .result-panel{display:none}
        .result-panel.active{display:block}
        .score-card{text-align:center;padding:30px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;color:#fff;margin-bottom:20px}
        .score-number{font-size:72px;font-weight:bold}
        .feedback-item{padding:12px 16px;background:#f8f9fa;border-radius:8px;margin-bottom:10px;border-left:4px solid #667eea}
        .feedback-item.good{border-left-color:#00ff88}
        .feedback-item.bad{border-left-color:#ff4757}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🎯 面霸</div>
            <div class="tagline">AI 模拟面试平台 - 让每一次面试都成为进步的机会</div>
        </header>
        <div class="main-content" id="setupPanel">
            <div class="panel">
                <h2>📝 面试配置</h2>
                <div class="form-group"><label>期望岗位</label><input type="text" id="jobTitle" placeholder="例如：高级产品经理"></div>
                <div class="form-group"><label>职位描述 (JD)</label><textarea id="jobDescription" placeholder="粘贴职位描述..."></textarea></div>
                <div class="form-group"><label>面试类型</label><select id="interviewType"><option value="hr">HR 面</option><option value="business" selected>业务面</option><option value="technical">技术面</option><option value="final">终面</option></select></div>
                <div class="form-group"><label>面试轮数</label><select id="interviewRounds"><option value="3">3 轮</option><option value="5" selected>5 轮</option></select></div>
                <button class="btn btn-primary" onclick="startInterview()">开始面试</button>
            </div>
            <div class="panel">
                <h2>👤 个人简历</h2>
                <div class="form-group"><label>姓名</label><input type="text" id="userName" placeholder="你的名字"></div>
                <div class="form-group"><label>工作年限</label><input type="text" id="userExperience" placeholder="例如：4 年"></div>
                <div class="form-group"><label>核心技能</label><textarea id="userSkills" placeholder="用逗号分隔"></textarea></div>
            </div>
        </div>
        <div class="panel chat-container" id="chatPanel">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <textarea id="userAnswer" placeholder="输入你的回答...（按 Enter 发送，Shift+Enter 换行）" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAnswer();}"></textarea>
                <button class="btn btn-primary" style="width:auto;" onclick="sendAnswer()">发送</button>
            </div>
        </div>
        <div class="panel result-panel" id="resultPanel">
            <h2>📊 面试反馈</h2>
            <div class="score-card"><div class="score-number" id="finalScore">--</div><div style="font-size:18px;opacity:0.9">综合评分</div></div>
            <div id="feedbackContent"></div>
            <button class="btn btn-primary" onclick="location.reload()" style="margin-top:20px;">再来一次</button>
        </div>
    </div>
<script>
let state={currentRound:0,totalRounds:5,messages:[],isInterviewing:false};
async function startInterview(){const jobTitle=document.getElementById('jobTitle').value;const jobDescription=document.getElementById('jobDescription').value;if(!jobTitle||!jobDescription){alert('请填写岗位和职位描述');return;}state={currentRound:0,totalRounds:parseInt(document.getElementById('interviewRounds').value),messages:[],isInterviewing:true};document.getElementById('setupPanel').style.display='none';document.getElementById('chatPanel').classList.add('active');await generateQuestion();}
async function generateQuestion(){const jobTitle=document.getElementById('jobTitle').value;const jobDescription=document.getElementById('jobDescription').value;const interviewType=document.getElementById('interviewType').value;const userExperience=document.getElementById('userExperience').value||'未知';const userSkills=document.getElementById('userSkills').value||'未知';const conversationHistory=state.messages.map(m=>`${m.role==='interviewer'?'面试官':'候选人'}：${m.content}`).join('\n');const systemPrompt=`你是一位经验丰富的${interviewType==='hr'?'HR':interviewType==='technical'?'技术专家':'业务负责人'}面试官，正在面试一位${userExperience}经验的${jobTitle}候选人。候选人技能：${userSkills}。职位描述：${jobDescription}。你的任务：1.根据 JD 和面试类型提出专业问题；2.每次只问一个问题；3.**根据候选人的回答进行追问**；4.保持专业友好；5.总共进行${state.totalRounds}轮。${conversationHistory?'之前的对话：\n'+conversationHistory+'\n\n请基于候选人的上一个回答，提出追问或进入下一个问题。':'现在请开始第 1 轮提问，请先让候选人做自我介绍。'}`;try{const response=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'YOUR_CLAUDE_API_KEY','anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-opus-4-6',max_tokens:500,messages:[{role:'user',content:systemPrompt}]}));const data=await response.json();addMessage('interviewer',data.content[0].text);}catch(error){console.error('API 调用失败:',error);addMessage('interviewer','你好，我是今天的面试官。请先简单介绍一下你自己吧。');}state.currentRound++;}
async function sendAnswer(){const answerInput=document.getElementById('userAnswer');const answer=answerInput.value.trim();if(!answer||!state.isInterviewing)return;addMessage('candidate',answer);answerInput.value='';if(state.currentRound>=state.totalRounds){await generateFeedback();}else{await generateQuestion();}}
async function generateFeedback(){state.isInterviewing=false;document.getElementById('chatPanel').classList.remove('active');document.getElementById('resultPanel').classList.add('active');const conversationHistory=state.messages.map(m=>`${m.role==='interviewer'?'面试官':'候选人'}：${m.content}`).join('\n');const feedbackPrompt=`基于以下面试对话，给出专业的面试反馈：\n\n${conversationHistory}\n\n请按照以下 JSON 格式输出：{"score":85,"strengths":["优点 1","优点 2"],"weaknesses":["缺点 1","缺点 2"],"suggestions":["建议 1","建议 2"]}`;try{const response=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'YOUR_CLAUDE_API_KEY','anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-opus-4-6',max_tokens:1000,messages:[{role:'user',content:feedbackPrompt}]}));const data=await response.json();const jsonMatch=data.content[0].text.match(/\{[\s\S]*?\}/);if(jsonMatch){const feedback=JSON.parse(jsonMatch[0]);document.getElementById('finalScore').textContent=feedback.score;document.getElementById('feedbackContent').innerHTML=`<div style="margin:20px 0;"><h3 style="color:#667eea;margin-bottom:12px;">✅ 优点</h3>${feedback.strengths.map(s=>`<div class="feedback-item good">• ${s}</div>`).join('')}</div><div style="margin:20px 0;"><h3 style="color:#667eea;margin-bottom:12px;">⚠️ 需要改进</h3>${feedback.weaknesses.map(w=>`<div class="feedback-item bad">• ${w}</div>`).join('')}</div><div style="margin:20px 0;"><h3 style="color:#667eea;margin-bottom:12px;">💡 改进建议</h3>${feedback.suggestions.map(s=>`<div class="feedback-item">• ${s}</div>`).join('')}</div>`;}else{document.getElementById('finalScore').textContent='75';document.getElementById('feedbackContent').innerHTML='<p style="text-align:center;padding:40px;color:#666;">面试完成！感谢参与！</p>';}}catch(error){console.error('反馈生成失败:',error);document.getElementById('finalScore').textContent='75';document.getElementById('feedbackContent').innerHTML='<p style="text-align:center;padding:40px;color:#666;">面试完成！感谢参与！</p>';}}
function addMessage(role,content){state.messages.push({role,content});const chatMessages=document.getElementById('chatMessages');const messageDiv=document.createElement('div');messageDiv.className=`message ${role}`;messageDiv.innerHTML=`<div class="avatar ${role}">${role==='interviewer'?'👔':'👤'}</div><div class="message-content">${content}</div>`;chatMessages.appendChild(messageDiv);chatMessages.scrollTop=chatMessages.scrollHeight;}
</script>
</body>
</html>
