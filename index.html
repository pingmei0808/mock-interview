<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面霸 - AI 模拟面试平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0; color: #fff; }
        .logo { font-size: 48px; font-weight: bold; margin-bottom: 10px; }
        .tagline { font-size: 18px; opacity: 0.9; }
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 30px; }
        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
        .panel { background: #fff; border-radius: 16px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .panel h2 { color: #667eea; margin-bottom: 20px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
        .btn { padding: 14px 28px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: linear-gradient(90deg, #667eea, #764ba2); color: #fff; width: 100%; }
        .chat-container { display: none; flex-direction: column; height: 600px; }
        .chat-container.active { display: flex; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; border-radius: 12px; margin-bottom: 20px; }
        .message { margin-bottom: 20px; display: flex; gap: 12px; }
        .message.interviewer { flex-direction: row; }
        .message.candidate { flex-direction: row-reverse; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .avatar.interviewer { background: #667eea; }
        .avatar.candidate { background: #764ba2; }
        .message-content { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; }
        .message.interviewer .message-content { background: #fff; }
        .message.candidate .message-content { background: #667eea; color: #fff; }
        .chat-input { display: flex; gap: 10px; }
        .chat-input textarea { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; resize: none; min-height: 60px; }
        .result-panel { display: none; }
        .result-panel.active { display: block; }
        .score-card { text-align: center; padding: 30px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; color: #fff; margin-bottom: 20px; }
        .score-number { font-size: 72px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🎯 面霸</div>
            <div class="tagline">AI 模拟面试平台 - 让每一次面试都成为进步的机会</div>
        </header>
        
        <div class="main-content" id="setupPanel">
            <div class="panel">
                <h2>📝 面试配置</h2>
                <div class="form-group">
                    <label>期望岗位</label>
                    <input type="text" id="jobTitle" placeholder="例如：高级产品经理">
                </div>
                <div class="form-group">
                    <label>职位描述 (JD)</label>
                    <textarea id="jobDescription" placeholder="粘贴职位描述..."></textarea>
                </div>
                <div class="form-group">
                    <label>面试类型</label>
                    <select id="interviewType">
                        <option value="hr">HR 面</option>
                        <option value="business" selected>业务面</option>
                        <option value="technical">技术面</option>
                        <option value="final">终面</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>面试轮数</label>
                    <select id="interviewRounds">
                        <option value="3">3 轮</option>
                        <option value="5" selected>5 轮</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="startInterview()">开始面试</button>
            </div>
            <div class="panel">
                <h2>👤 个人简历</h2>
                <div class="form-group"><label>姓名</label><input type="text" id="userName" placeholder="你的名字"></div>
                <div class="form-group"><label>工作年限</label><input type="text" id="userExperience" placeholder="例如：4 年"></div>
                <div class="form-group"><label>核心技能</label><textarea id="userSkills" placeholder="用逗号分隔"></textarea></div>
            </div>
        </div>
        
        <div class="panel chat-container" id="chatPanel">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <textarea id="userAnswer" placeholder="输入你的回答..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAnswer();}"></textarea>
                <button class="btn btn-primary" style="width:auto;" onclick="sendAnswer()">发送</button>
            </div>
        </div>
        
        <div class="panel result-panel" id="resultPanel">
            <h2>📊 面试反馈</h2>
            <div class="score-card"><div class="score-number" id="finalScore">--</div><div>综合评分</div></div>
            <div id="feedbackContent"></div>
            <button class="btn btn-primary" onclick="location.reload()" style="margin-top:20px;">再来一次</button>
        </div>
    </div>

    <script>
    let state = { currentRound: 0, totalRounds: 5, messages: [], isInterviewing: false };
    
    async function startInterview() {
        const jobTitle = document.getElementById('jobTitle').value;
        const jobDescription = document.getElementById('jobDescription').value;
        if (!jobTitle || !jobDescription) { alert('请填写岗位和职位描述'); return; }
        
        state = { currentRound: 0, totalRounds: parseInt(document.getElementById('interviewRounds').value), messages: [], isInterviewing: true };
        document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('chatPanel').classList.add('active');
        await generateQuestion();
    }
    
    async function generateQuestion() {
        const jobTitle = document.getElementById('jobTitle').value;
        const jobDescription = document.getElementById('jobDescription').value;
        const interviewType = document.getElementById('interviewType').value;
        
        const conversationHistory = state.messages.map(m => `${m.role==='interviewer'?'面试官':'候选人'}：${m.content}`).join('\n');
        
        const systemPrompt = `你是一位经验丰富的${interviewType==='hr'?'HR':interviewType==='technical'?'技术专家':'业务负责人'}面试官。

职位描述：${jobDescription}

${conversationHistory ? '之前的对话：\n' + conversationHistory + '\n\n请基于候选人的上一个回答，提出追问或进入下一个问题。' : '现在请开始第 1 轮提问，请先让候选人做自我介绍。'}

每次只问一个问题，保持专业友好。`;

        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': 'YOUR_CLAUDE_API_KEY',
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: 'claude-opus-4-6',
                    max_tokens: 500,
                    messages: [{ role: 'user', content: systemPrompt }]
                })
            });
            const data = await response.json();
            addMessage('interviewer', data.content[0].text);
        } catch (error) {
            addMessage('interviewer', '你好，我是今天的面试官。请先简单介绍一下你自己吧。');
        }
        state.currentRound++;
    }
    
    async function sendAnswer() {
        const answerInput = document.getElementById('userAnswer');
        const answer = answerInput.value.trim();
        if (!answer || !state.isInterviewing) return;
        
        addMessage('candidate', answer);
        answerInput.value = '';
        
        if (state.currentRound >= state.totalRounds) {
            await generateFeedback();
        } else {
            await generateQuestion();
        }
    }
    
    async function generateFeedback() {
        state.isInterviewing = false;
        document.getElementById('chatPanel').classList.remove('active');
        document.getElementById('resultPanel').classList.add('active');
        
        const conversationHistory = state.messages.map(m => `${m.role==='interviewer'?'面试官':'候选人'}：${m.content}`).join('\n');
        
        const feedbackPrompt = `基于以下面试对话，给出评分和建议：\n\n${conversationHistory}\n\n请按 JSON 格式输出：{"score":85,"strengths":["优点 1"],"weaknesses":["缺点 1"],"suggestions":["建议 1"]}`;
        
        try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': 'YOUR_CLAUDE_API_KEY',
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: 'claude-opus-4-6',
                    max_tokens: 1000,
                    messages: [{ role: 'user', content: feedbackPrompt }]
                })
            });
            const data = await response.json();
            const jsonMatch = data.content[0].text.match(/\{[\s\S]*?\}/);
            if (jsonMatch) {
                const feedback = JSON.parse(jsonMatch[0]);
                document.getElementById('finalScore').textContent = feedback.score;
                document.getElementById('feedbackContent').innerHTML = `
                    <div style="margin:20px 0;"><strong>✅ 优点：</strong><br>${feedback.strengths.map(s=>`• ${s}`).join('<br>')}</div>
                    <div style="margin:20px 0;"><strong>⚠️ 需要改进：</strong><br>${feedback.weaknesses.map(w=>`• ${w}`).join('<br>')}</div>
                    <div style="margin:20px 0;"><strong>💡 建议：</strong><br>${feedback.suggestions.map(s=>`• ${s}`).join('<br>')}</div>
                `;
            }
        } catch (error) {
            document.getElementById('finalScore').textContent = '75';
            document.getElementById('feedbackContent').innerHTML = '<p>面试完成！请继续加油！</p>';
        }
    }
    
    function addMessage(role, content) {
        state.messages.push({ role, content });
        const chatMessages = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        messageDiv.innerHTML = `<div class="avatar ${role}">${role==='interviewer'?'👔':'👤'}</div><div class="message-content">${content}</div>`;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    </script>
</body>
</html>
