<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面霸 - AI 模拟面试平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header {
            text-align: center;
            padding: 40px 0;
            color: #fff;
        }
        .logo { font-size: 48px; font-weight: bold; margin-bottom: 10px; }
        .tagline { font-size: 18px; opacity: 0.9; }
        
        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }
        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
        }
        
        /* Panels */
        .panel {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        /* Form Elements */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }
        
        /* Buttons */
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: #fff;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-right: 10px;
        }
        .btn-danger {
            background: #ff4757;
            color: #fff;
        }
        
        /* Chat Interface */
        .chat-container {
            display: none;
            flex-direction: column;
            height: 600px;
        }
        .chat-container.active { display: flex; }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }
        .message.interviewer { flex-direction: row; }
        .message.candidate { flex-direction: row-reverse; }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .avatar.interviewer { background: #667eea; }
        .avatar.candidate { background: #764ba2; }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
        }
        .message.interviewer .message-content {
            background: #fff;
            border-bottom-left-radius: 4px;
        }
        .message.candidate .message-content {
            background: #667eea;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        
        .chat-input {
            display: flex;
            gap: 10px;
        }
        .chat-input textarea {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            resize: none;
            min-height: 60px;
            font-family: inherit;
        }
        .chat-input textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* Result Panel */
        .result-panel {
            display: none;
        }
        .result-panel.active { display: block; }
        
        .score-card {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            color: #fff;
            margin-bottom: 20px;
        }
        .score-number {
            font-size: 72px;
            font-weight: bold;
        }
        .score-label { font-size: 18px; opacity: 0.9; }
        
        .feedback-section {
            margin-bottom: 20px;
        }
        .feedback-section h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .feedback-item {
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        .feedback-item.good { border-left-color: #00ff88; }
        .feedback-item.bad { border-left-color: #ff4757; }
        
        /* Progress */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 0 20px;
        }
        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .progress-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #999;
        }
        .progress-circle.active {
            background: #667eea;
            color: #fff;
        }
        .progress-circle.completed {
            background: #00ff88;
            color: #fff;
        }
        .progress-label {
            font-size: 12px;
            color: #999;
        }
        
        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading.active { display: block; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🎯 面霸</div>
            <div class="tagline">AI 模拟面试平台 - 让每一次面试都成为进步的机会</div>
        </header>
        
        <!-- 配置面板 -->
        <div class="main-content" id="setupPanel">
            <div class="panel">
                <h2>📝 面试配置</h2>
                
                <div class="form-group">
                    <label>期望岗位</label>
                    <input type="text" id="jobTitle" placeholder="例如：高级产品经理">
                </div>
                
                <div class="form-group">
                    <label>职位描述 (JD)</label>
                    <textarea id="jobDescription" placeholder="粘贴职位描述..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>面试类型</label>
                    <select id="interviewType">
                        <option value="hr">HR 面</option>
                        <option value="business" selected>业务面</option>
                        <option value="technical">技术面</option>
                        <option value="final">终面</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>面试轮数</label>
                    <select id="interviewRounds">
                        <option value="3">3 轮</option>
                        <option value="5" selected>5 轮</option>
                        <option value="10">10 轮</option>
                    </select>
                </div>
                
                <button class="btn btn-primary" onclick="startInterview()">开始面试</button>
            </div>
            
            <div class="panel">
                <h2>👤 个人简历</h2>
                
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="userName" placeholder="你的名字">
                </div>
                
                <div class="form-group">
                    <label>工作年限</label>
                    <input type="text" id="userExperience" placeholder="例如：4 年">
                </div>
                
                <div class="form-group">
                    <label>核心技能</label>
                    <textarea id="userSkills" placeholder="用逗号分隔，例如：产品设计，数据分析，团队管理"></textarea>
                </div>
                
                <div class="form-group">
                    <label>工作经历</label>
                    <textarea id="userWorkHistory" placeholder="简要描述你的工作经历..."></textarea>
                </div>
            </div>
        </div>
        
        <!-- 面试界面 -->
        <div class="panel chat-container" id="chatPanel">
            <div class="progress-bar">
                <div class="progress-step">
                    <div class="progress-circle active" id="progress1">1</div>
                    <div class="progress-label">第 1 轮</div>
                </div>
                <div class="progress-step">
                    <div class="progress-circle" id="progress2">2</div>
                    <div class="progress-label">第 2 轮</div>
                </div>
                <div class="progress-step">
                    <div class="progress-circle" id="progress3">3</div>
                    <div class="progress-label">第 3 轮</div>
                </div>
                <div class="progress-step">
                    <div class="progress-circle" id="progress4">4</div>
                    <div class="progress-label">第 4 轮</div>
                </div>
                <div class="progress-step">
                    <div class="progress-circle" id="progress5">5</div>
                    <div class="progress-label">第 5 轮</div>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <!-- 消息会动态添加 -->
            </div>
            
            <div class="chat-input">
                <textarea id="userAnswer" placeholder="输入你的回答...（按 Enter 发送，Shift+Enter 换行）" onkeydown="handleKeyDown(event)"></textarea>
                <button class="btn btn-primary" style="width: auto;" onclick="sendAnswer()">发送</button>
                <button class="btn btn-danger" style="width: auto;" onclick="endInterview()">结束面试</button>
            </div>
        </div>
        
        <!-- 加载界面 -->
        <div class="panel loading" id="loadingPanel">
            <div class="spinner"></div>
            <div id="loadingText">AI 面试官正在思考...</div>
        </div>
        
        <!-- 结果面板 -->
        <div class="panel result-panel" id="resultPanel">
            <h2>📊 面试反馈</h2>
            
            <div class="score-card">
                <div class="score-number" id="finalScore">--</div>
                <div class="score-label">综合评分</div>
            </div>
            
            <div class="feedback-section">
                <h3>✅ 优点</h3>
                <div id="strengthsList"></div>
            </div>
            
            <div class="feedback-section">
                <h3>⚠️ 需要改进</h3>
                <div id="weaknessesList"></div>
            </div>
            
            <div class="feedback-section">
                <h3>💡 改进建议</h3>
                <div id="suggestionsList"></div>
            </div>
            
            <button class="btn btn-primary" onclick="restartInterview()">再来一次</button>
        </div>
    </div>

    <script>
        // 状态管理
        let state = {
            currentRound: 0,
            totalRounds: 5,
            interviewType: 'business',
            messages: [],
            isInterviewing: false
        };
        
        // 开始面试
        async function startInterview() {
            const jobTitle = document.getElementById('jobTitle').value;
            const jobDescription = document.getElementById('jobDescription').value;
            const interviewType = document.getElementById('interviewType').value;
            const totalRounds = parseInt(document.getElementById('interviewRounds').value);
            
            if (!jobTitle || !jobDescription) {
                alert('请填写岗位和职位描述');
                return;
            }
            
            // 更新状态
            state = {
                currentRound: 0,
                totalRounds: totalRounds,
                interviewType: interviewType,
                messages: [],
                isInterviewing: true
            };
            
            // 切换界面
            document.getElementById('setupPanel').style.display = 'none';
            document.getElementById('chatPanel').classList.add('active');
            
            // 初始化进度条
            updateProgressBar();
            
            // 生成第一个问题
            await generateQuestion();
        }
        
        // 生成问题
        async function generateQuestion() {
            showLoading(true);
            
            const jobTitle = document.getElementById('jobTitle').value;
            const jobDescription = document.getElementById('jobDescription').value;
            const userName = document.getElementById('userName').value || '候选人';
            const userExperience = document.getElementById('userExperience').value || '未知';
            const userSkills = document.getElementById('userSkills').value || '未知';
            
            // 构建系统提示词
            const systemPrompt = `你是一位经验丰富的${state.interviewType === 'hr' ? 'HR' : state.interviewType === 'technical' ? '技术专家' : '业务负责人'}面试官，正在面试一位${userExperience}经验的${jobTitle}候选人。
            
候选人技能：${userSkills}

职位描述：
${jobDescription}

你的任务：
1. 根据 JD 和面试类型，提出专业、有针对性的问题
2. 每次只问一个问题，问题要简洁清晰
3. 根据候选人的回答进行追问或进入下一个问题
4. 保持专业、友好的态度
5. 总共进行${state.totalRounds}轮提问

现在请开始第${state.currentRound + 1}轮提问。`;

            try {
                // 调用 Claude API
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': 'YOUR_CLAUDE_API_KEY',
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-opus-4-6',
                        max_tokens: 500,
                        messages: [{
                            role: 'user',
                            content: systemPrompt
                        }]
                    })
                });
                
                const data = await response.json();
                const question = data.content[0].text;
                
                // 添加消息
                addMessage('interviewer', question);
                
            } catch (error) {
                console.error('API 调用失败:', error);
                addMessage('interviewer', '你好，我是今天的面试官。请先简单介绍一下你自己吧。');
            }
            
            showLoading(false);
            state.currentRound++;
            updateProgressBar();
        }
        
        // 发送回答
        async function sendAnswer() {
            const answerInput = document.getElementById('userAnswer');
            const answer = answerInput.value.trim();
            
            if (!answer || !state.isInterviewing) return;
            
            // 添加用户消息
            addMessage('candidate', answer);
            answerInput.value = '';
            
            // 检查是否结束
            if (state.currentRound >= state.totalRounds) {
                await generateFeedback();
            } else {
                // 生成下一个问题
                await generateQuestion();
            }
        }
        
        // 生成反馈
        async function generateFeedback() {
            showLoading(true);
            
            const jobTitle = document.getElementById('jobTitle').value;
            const jobDescription = document.getElementById('jobDescription').value;
            
            // 构建对话历史
            const conversationHistory = state.messages.map(m => 
                `${m.role === 'interviewer' ? '面试官' : '候选人'}：${m.content}`
            ).join('\n');
            
            const feedbackPrompt = `基于以下面试对话，给出专业的面试反馈：

面试岗位：${jobTitle}
职位描述：${jobDescription}

面试对话：
${conversationHistory}

请按照以下 JSON 格式输出反馈：
{
  "score": 0-100,
  "strengths": ["优点 1", "优点 2", "优点 3"],
  "weaknesses": ["缺点 1", "缺点 2", "缺点 3"],
  "suggestions": ["建议 1", "建议 2", "建议 3"]
}`;

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': 'YOUR_CLAUDE_API_KEY',
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-opus-4-6',
                        max_tokens: 1000,
                        messages: [{
                            role: 'user',
                            content: feedbackPrompt
                        }]
                    })
                });
                
                const data = await response.json();
                const feedbackText = data.content[0].text;
                
                // 解析 JSON
                const jsonMatch = feedbackText.match(/\{[\s\S]*?\}/);
                if (jsonMatch) {
                    const feedback = JSON.parse(jsonMatch[0]);
                    showFeedback(feedback);
                }
                
            } catch (error) {
                console.error('反馈生成失败:', error);
                showFeedback({
                    score: 75,
                    strengths: ['表达清晰', '逻辑性强', '态度积极'],
                    weaknesses: ['经验展示不足', '案例不够具体'],
                    suggestions: ['多准备具体案例', '突出个人贡献']
                });
            }
            
            showLoading(false);
        }
        
        // 显示反馈
        function showFeedback(feedback) {
            state.isInterviewing = false;
            
            document.getElementById('chatPanel').classList.remove('active');
            document.getElementById('resultPanel').classList.add('active');
            
            document.getElementById('finalScore').textContent = feedback.score;
            
            const strengthsList = document.getElementById('strengthsList');
            strengthsList.innerHTML = feedback.strengths.map(s => 
                `<div class="feedback-item good">${s}</div>`
            ).join('');
            
            const weaknessesList = document.getElementById('weaknessesList');
            weaknessesList.innerHTML = feedback.weaknesses.map(w => 
                `<div class="feedback-item bad">${w}</div>`
            ).join('');
            
            const suggestionsList = document.getElementById('suggestionsList');
            suggestionsList.innerHTML = feedback.suggestions.map(s => 
                `<div class="feedback-item">${s}</div>`
            ).join('');
        }
        
        // 添加消息
        function addMessage(role, content) {
            state.messages.push({ role, content });
            
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="avatar ${role}">${role === 'interviewer' ? '👔' : '👤'}</div>
                <div class="message-content">${content}</div>
            `;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 更新进度条
        function updateProgressBar() {
            for (let i = 1; i <= 5; i++) {
                const circle = document.getElementById(`progress${i}`);
                if (i < state.currentRound) {
                    circle.className = 'progress-circle completed';
                } else if (i === state.currentRound) {
                    circle.className = 'progress-circle active';
                } else {
                    circle.className = 'progress-circle';
                }
            }
        }
        
        // 显示加载
        function showLoading(show) {
            const loading = document.getElementById('loadingPanel');
            const chat = document.getElementById('chatPanel');
            
            if (show) {
                chat.style.opacity = '0.5';
                chat.style.pointerEvents = 'none';
                loading.classList.add('active');
            } else {
                chat.style.opacity = '1';
                chat.style.pointerEvents = 'auto';
                loading.classList.remove('active');
            }
        }
        
        // 结束面试
        function endInterview() {
            if (!confirm('确定要结束面试吗？')) return;
            generateFeedback();
        }
        
        // 重新开始
        function restartInterview() {
            document.getElementById('resultPanel').classList.remove('active');
            document.getElementById('setupPanel').style.display = 'grid';
            document.getElementById('chatMessages').innerHTML = '';
        }
        
        // 键盘事件
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendAnswer();
            }
        }
    </script>
</body>
</html>
