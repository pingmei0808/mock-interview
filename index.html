<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面霸 - AI 模拟面试平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 24px; }
        
        /* Header */
        header { text-align: center; margin-bottom: 48px; }
        .logo { font-size: 36px; font-weight: 600; margin-bottom: 12px; color: #1a1a1a; }
        .tagline { font-size: 16px; color: #666; }
        
        /* Main Content */
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 32px; }
        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
        
        /* Panels */
        .panel {
            background: #fafafa;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 32px;
        }
        .panel h2 {
            color: #1a1a1a;
            margin-bottom: 24px;
            font-size: 18px;
            font-weight: 600;
        }
        
        /* Form Elements */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1a1a1a;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            font-size: 14px;
            background: #ffffff;
            color: #1a1a1a;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1a1a1a;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        
        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #1a1a1a;
            color: #ffffff;
            width: 100%;
        }
        .btn-primary:hover {
            background: #333;
        }
        
        /* Chat Interface */
        .chat-container {
            display: none;
            flex-direction: column;
            height: calc(100vh - 200px);
            min-height: 500px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            overflow: hidden;
        }
        .chat-container.active { display: flex; }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #fafafa;
        }
        
        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            max-width: 80%;
        }
        .message.interviewer { margin-right: auto; }
        .message.candidate { margin-left: auto; flex-direction: row-reverse; }
        
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            background: #f0f0f0;
        }
        
        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
        }
        .message.interviewer .message-content {
            background: #ffffff;
            border: 1px solid #e5e5e5;
        }
        .message.candidate .message-content {
            background: #1a1a1a;
            color: #ffffff;
        }
        
        /* Chat Input */
        .chat-input {
            display: flex;
            gap: 12px;
            padding: 16px 24px;
            background: #ffffff;
            border-top: 1px solid #e5e5e5;
        }
        .chat-input textarea {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            resize: none;
            min-height: 56px;
            font-family: inherit;
            font-size: 14px;
            background: #fafafa;
        }
        .chat-input textarea:focus {
            outline: none;
            border-color: #1a1a1a;
            background: #ffffff;
        }
        
        /* Result Panel */
        .result-panel {
            display: none;
            max-width: 800px;
            margin: 0 auto;
        }
        .result-panel.active { display: block; }
        
        .score-card {
            text-align: center;
            padding: 48px;
            background: #fafafa;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            margin-bottom: 32px;
        }
        .score-number {
            font-size: 64px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .score-label {
            font-size: 16px;
            color: #666;
            margin-top: 8px;
        }
        
        .feedback-section {
            margin-bottom: 24px;
        }
        .feedback-section h3 {
            color: #1a1a1a;
            margin-bottom: 16px;
            font-size: 16px;
            font-weight: 600;
        }
        .feedback-item {
            padding: 12px 16px;
            background: #fafafa;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid #1a1a1a;
            font-size: 14px;
        }
        .feedback-item.good { border-left-color: #059669; }
        .feedback-item.bad { border-left-color: #dc2626; }
        
        /* Progress */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            padding: 16px 24px;
            background: #fafafa;
            border-bottom: 1px solid #e5e5e5;
        }
        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .progress-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 500;
            color: #666;
        }
        .progress-circle.active {
            background: #1a1a1a;
            color: #ffffff;
        }
        .progress-circle.completed {
            background: #059669;
            color: #ffffff;
        }
        .progress-label {
            font-size: 12px;
            color: #666;
        }
        
        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            background: #fafafa;
        }
        .loading.active { display: block; }
        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #e5e5e5;
            border-top-color: #1a1a1a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">面霸</div>
            <div class="tagline">AI 模拟面试平台</div>
        </header>
        
        <!-- Setup Panel -->
        <div class="main-content" id="setupPanel">
            <div class="panel">
                <h2>面试配置</h2>
                <div class="form-group">
                    <label>期望岗位</label>
                    <input type="text" id="jobTitle" placeholder="例如：高级产品经理">
                </div>
                <div class="form-group">
                    <label>职位描述 (JD)</label>
                    <textarea id="jobDescription" placeholder="粘贴职位描述..."></textarea>
                </div>
                <div class="form-group">
                    <label>面试类型</label>
                    <select id="interviewType">
                        <option value="hr">HR 面</option>
                        <option value="business" selected>业务面</option>
                        <option value="technical">技术面</option>
                        <option value="final">终面</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>面试轮数</label>
                    <select id="interviewRounds">
                        <option value="3">3 轮</option>
                        <option value="5" selected>5 轮</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="startInterview()">开始面试</button>
            </div>
            
            <div class="panel">
                <h2>个人简历</h2>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="userName" placeholder="你的名字">
                </div>
                <div class="form-group">
                    <label>工作年限</label>
                    <input type="text" id="userExperience" placeholder="例如：4 年">
                </div>
                <div class="form-group">
                    <label>核心技能</label>
                    <textarea id="userSkills" placeholder="用逗号分隔"></textarea>
                </div>
            </div>
        </div>
        
        <!-- Chat Interface -->
        <div class="chat-container" id="chatPanel">
            <div class="progress-bar">
                <div class="progress-step">
                    <div class="progress-circle active" id="progress1">1</div>
                    <div class="progress-label">第 1 轮</div>
                </div>
                <div class="progress-step">
                    <div class="progress-circle" id="progress2">2</div>
                    <div class="progress-label">第 2 轮</div>
                </div>
                <div class="progress-step">
                    <div class="progress-circle" id="progress3">3</div>
                    <div class="progress-label">第 3 轮</div>
                </div>
                <div class="progress-step">
                    <div class="progress-circle" id="progress4">4</div>
                    <div class="progress-label">第 4 轮</div>
                </div>
                <div class="progress-step">
                    <div class="progress-circle" id="progress5">5</div>
                    <div class="progress-label">第 5 轮</div>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <!-- Messages will be added here -->
            </div>
            
            <div class="chat-input">
                <textarea id="userAnswer" placeholder="输入你的回答...（按 Enter 发送，Shift+Enter 换行）" onkeydown="handleKeyDown(event)"></textarea>
                <button class="btn btn-primary" style="width: auto;" onclick="sendAnswer()">发送</button>
            </div>
        </div>
        
        <!-- Loading -->
        <div class="loading" id="loadingPanel">
            <div class="spinner"></div>
            <div id="loadingText">AI 面试官正在思考...</div>
        </div>
        
        <!-- Result Panel -->
        <div class="result-panel" id="resultPanel">
            <div class="score-card">
                <div class="score-number" id="finalScore">--</div>
                <div class="score-label">综合评分</div>
            </div>
            
            <div class="feedback-section">
                <h3>优点</h3>
                <div id="strengthsList"></div>
            </div>
            
            <div class="feedback-section">
                <h3>需要改进</h3>
                <div id="weaknessesList"></div>
            </div>
            
            <div class="feedback-section">
                <h3>改进建议</h3>
                <div id="suggestionsList"></div>
            </div>
            
            <button class="btn btn-primary" onclick="restartInterview()" style="margin-top: 24px;">再来一次</button>
        </div>
    </div>

    <script>
        // State
        let state = {
            currentRound: 0,
            totalRounds: 5,
            interviewType: 'business',
            messages: [],
            isInterviewing: false
        };
        
        // Load saved data on page load
        window.addEventListener('load', () => {
            const savedData = JSON.parse(localStorage.getItem('mockInterviewData') || '{}');
            if (savedData.jobTitle) document.getElementById('jobTitle').value = savedData.jobTitle;
            if (savedData.jobDescription) document.getElementById('jobDescription').value = savedData.jobDescription;
            if (savedData.interviewType) document.getElementById('interviewType').value = savedData.interviewType;
            if (savedData.interviewRounds) document.getElementById('interviewRounds').value = savedData.interviewRounds;
            if (savedData.userName) document.getElementById('userName').value = savedData.userName;
            if (savedData.userExperience) document.getElementById('userExperience').value = savedData.userExperience;
            if (savedData.userSkills) document.getElementById('userSkills').value = savedData.userSkills;
        });
        
        // Save data to localStorage
        function saveData() {
            const data = {
                jobTitle: document.getElementById('jobTitle').value,
                jobDescription: document.getElementById('jobDescription').value,
                interviewType: document.getElementById('interviewType').value,
                interviewRounds: document.getElementById('interviewRounds').value,
                userName: document.getElementById('userName').value,
                userExperience: document.getElementById('userExperience').value,
                userSkills: document.getElementById('userSkills').value
            };
            localStorage.setItem('mockInterviewData', JSON.stringify(data));
        }
        
        // Add event listeners to save on change
        ['jobTitle', 'jobDescription', 'interviewType', 'interviewRounds', 'userName', 'userExperience', 'userSkills'].forEach(id => {
            document.getElementById(id).addEventListener('change', saveData);
            document.getElementById(id).addEventListener('input', saveData);
        });
        
        // Start Interview
        async function startInterview() {
            const jobTitle = document.getElementById('jobTitle').value;
            const jobDescription = document.getElementById('jobDescription').value;
            
            if (!jobTitle || !jobDescription) {
                alert('请填写岗位和职位描述');
                return;
            }
            
            saveData();
            
            state = {
                currentRound: 0,
                totalRounds: parseInt(document.getElementById('interviewRounds').value),
                interviewType: document.getElementById('interviewType').value,
                messages: [],
                isInterviewing: true
            };
            
            document.getElementById('setupPanel').classList.add('hidden');
            document.getElementById('chatPanel').classList.add('active');
            updateProgressBar();
            await generateQuestion();
        }
        
        // Generate Question
        async function generateQuestion() {
            showLoading(true);
            
            const jobTitle = document.getElementById('jobTitle').value;
            const jobDescription = document.getElementById('jobDescription').value;
            const interviewType = document.getElementById('interviewType').value;
            const userExperience = document.getElementById('userExperience').value || '未知';
            const userSkills = document.getElementById('userSkills').value || '未知';
            
            const conversationHistory = state.messages.map(m => 
                `${m.role === 'interviewer' ? '面试官' : '候选人'}：${m.content}`
            ).join('\n');
            
            const systemPrompt = `你是一位经验丰富的${interviewType === 'hr' ? 'HR' : interviewType === 'technical' ? '技术专家' : '业务负责人'}面试官，正在面试一位${userExperience}经验的${jobTitle}候选人。
            
候选人技能：${userSkills}

职位描述：
${jobDescription}

你的任务：
1. 根据 JD 和面试类型，提出专业、有针对性的问题
2. 每次只问一个问题，问题要简洁清晰
3. **根据候选人的回答进行追问或进入下一个问题**（重要！）
4. 保持专业、友好的态度
5. 总共进行${state.totalRounds}轮提问

${conversationHistory ? '之前的对话：\n' + conversationHistory : ''}

${conversationHistory ? '请基于候选人的上一个回答，提出追问或进入下一个问题。' : '现在请开始第 1 轮提问，请先让候选人做自我介绍。'}`;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-opus-4-6',
                        max_tokens: 500,
                        messages: [{
                            role: 'user',
                            content: systemPrompt
                        }]
                    })
                });
                
                const data = await response.json();
                const question = data.content[0].text;
                
                addMessage('interviewer', question);
                
            } catch (error) {
                console.error('API 调用失败:', error);
                addMessage('interviewer', '你好，我是今天的面试官。请先简单介绍一下你自己吧。');
            }
            
            showLoading(false);
            state.currentRound++;
            updateProgressBar();
        }
        
        // Send Answer
        async function sendAnswer() {
            const answerInput = document.getElementById('userAnswer');
            const answer = answerInput.value.trim();
            
            if (!answer || !state.isInterviewing) return;
            
            addMessage('candidate', answer);
            answerInput.value = '';
            
            if (state.currentRound >= state.totalRounds) {
                await generateFeedback();
            } else {
                await generateQuestion();
            }
        }
        
        // Generate Feedback
        async function generateFeedback() {
            showLoading(true);
            
            const jobTitle = document.getElementById('jobTitle').value;
            const jobDescription = document.getElementById('jobDescription').value;
            
            const conversationHistory = state.messages.map(m => 
                `${m.role === 'interviewer' ? '面试官' : '候选人'}：${m.content}`
            ).join('\n');
            
            const feedbackPrompt = `基于以下面试对话，给出专业的面试反馈：

面试岗位：${jobTitle}
职位描述：${jobDescription}

面试对话：
${conversationHistory}

请按照以下 JSON 格式输出反馈：
{
  "score": 0-100,
  "strengths": ["优点 1", "优点 2", "优点 3"],
  "weaknesses": ["缺点 1", "缺点 2", "缺点 3"],
  "suggestions": ["建议 1", "建议 2", "建议 3"]
}`;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-opus-4-6',
                        max_tokens: 1000,
                        messages: [{
                            role: 'user',
                            content: feedbackPrompt
                        }]
                    })
                });
                
                const data = await response.json();
                const feedbackText = data.content[0].text;
                
                const jsonMatch = feedbackText.match(/\{[\s\S]*?\}/);
                if (jsonMatch) {
                    const feedback = JSON.parse(jsonMatch[0]);
                    showFeedback(feedback);
                }
                
            } catch (error) {
                console.error('反馈生成失败:', error);
                showFeedback({
                    score: 75,
                    strengths: ['表达清晰', '逻辑性强', '态度积极'],
                    weaknesses: ['经验展示不足', '案例不够具体'],
                    suggestions: ['多准备具体案例', '突出个人贡献']
                });
            }
            
            showLoading(false);
        }
        
        // Show Feedback
        function showFeedback(feedback) {
            state.isInterviewing = false;
            
            document.getElementById('chatPanel').classList.add('hidden');
            document.getElementById('resultPanel').classList.add('active');
            
            document.getElementById('finalScore').textContent = feedback.score;
            
            const strengthsList = document.getElementById('strengthsList');
            strengthsList.innerHTML = feedback.strengths.map(s => 
                `<div class="feedback-item good">• ${s}</div>`
            ).join('');
            
            const weaknessesList = document.getElementById('weaknessesList');
            weaknessesList.innerHTML = feedback.weaknesses.map(w => 
                `<div class="feedback-item bad">• ${w}</div>`
            ).join('');
            
            const suggestionsList = document.getElementById('suggestionsList');
            suggestionsList.innerHTML = feedback.suggestions.map(s => 
                `<div class="feedback-item">• ${s}</div>`
            ).join('');
        }
        
        // Add Message
        function addMessage(role, content) {
            state.messages.push({ role, content });
            
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="avatar">${role === 'interviewer' ? '👔' : '👤'}</div>
                <div class="message-content">${content}</div>
            `;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // Update Progress Bar
        function updateProgressBar() {
            for (let i = 1; i <= 5; i++) {
                const circle = document.getElementById(`progress${i}`);
                if (i < state.currentRound) {
                    circle.className = 'progress-circle completed';
                } else if (i === state.currentRound) {
                    circle.className = 'progress-circle active';
                } else {
                    circle.className = 'progress-circle';
                }
            }
        }
        
        // Show Loading
        function showLoading(show) {
            const loading = document.getElementById('loadingPanel');
            const chat = document.getElementById('chatPanel');
            
            if (show) {
                chat.style.opacity = '0.5';
                chat.style.pointerEvents = 'none';
                loading.classList.add('active');
            } else {
                chat.style.opacity = '1';
                chat.style.pointerEvents = 'auto';
                loading.classList.remove('active');
            }
        }
        
        // End Interview
        function endInterview() {
            if (!confirm('确定要结束面试吗？')) return;
            generateFeedback();
        }
        
        // Restart Interview
        function restartInterview() {
            document.getElementById('resultPanel').classList.remove('active');
            document.getElementById('setupPanel').classList.remove('hidden');
            document.getElementById('chatMessages').innerHTML = '';
            state = {
                currentRound: 0,
                totalRounds: 5,
                interviewType: 'business',
                messages: [],
                isInterviewing: false
            };
        }
        
        // Handle Key Down
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendAnswer();
            }
        }
    </script>
</body>
</html>
